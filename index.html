<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Autocrop</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
      gap: 2rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    #drop-zone {
      width: 100%;
      max-width: 640px;
      border: 2px dashed #444;
      border-radius: 12px;
      padding: 3rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }

    #drop-zone.drag-over {
      border-color: #6c8fff;
      background: #1a1f33;
    }

    #drop-zone p {
      color: #888;
      font-size: 0.95rem;
      margin-top: 0.5rem;
    }

    #drop-zone span.icon { font-size: 2.5rem; }

    #file-input { display: none; }

    #options {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    label { font-size: 0.9rem; color: #aaa; display: flex; align-items: center; gap: 0.4rem; cursor: pointer; }
    input[type=number] {
      width: 60px;
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 6px;
      color: #e0e0e0;
      padding: 0.3rem 0.5rem;
      font-size: 0.9rem;
    }
    input[type=checkbox] { accent-color: #6c8fff; }

    #results {
      width: 100%;
      max-width: 900px;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .result-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      overflow: hidden;
    }

    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1rem;
      background: #222;
      border-bottom: 1px solid #2a2a2a;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .result-header .filename {
      font-size: 0.85rem;
      color: #bbb;
      word-break: break-all;
    }

    .result-header .meta {
      font-size: 0.78rem;
      color: #666;
      white-space: nowrap;
    }

    .badge {
      font-size: 0.72rem;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      white-space: nowrap;
    }
    .badge-stripped  { background: #2a1f1f; color: #ff8a80; border: 1px solid #4a2a2a; }
    .badge-kept      { background: #1f2a1f; color: #80e680; border: 1px solid #2a4a2a; }
    .badge-warn      { background: #2a2a1a; color: #ffe080; border: 1px solid #4a4a1a; }

    .result-header .btn-download {
      background: #6c8fff;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 0.4rem 0.9rem;
      font-size: 0.85rem;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .result-header .btn-download:hover { background: #5a7aff; }

    .preview-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: #2a2a2a;
    }

    .preview-box {
      background: #111;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    .preview-box span {
      font-size: 0.75rem;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .preview-box img {
      max-width: 100%;
      max-height: 260px;
      object-fit: contain;
      background-image:
        linear-gradient(45deg, #2a2a2a 25%, transparent 25%),
        linear-gradient(-45deg, #2a2a2a 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #2a2a2a 75%),
        linear-gradient(-45deg, transparent 75%, #2a2a2a 75%);
      background-size: 16px 16px;
      background-position: 0 0, 0 8px, 8px -8px, -8px 0;
      border-radius: 4px;
    }

    .error-msg {
      color: #ff6b6b;
      font-size: 0.85rem;
      padding: 1rem;
    }

    #status {
      font-size: 0.85rem;
      color: #666;
      min-height: 1.2em;
    }
  </style>
</head>
<body>
  <h1>Image Autocrop</h1>
  <p style="color:#666;font-size:0.9rem;text-align:center">Crops PNG &amp; WebP images to their non-transparent content bounds</p>

  <div id="drop-zone">
    <span class="icon">🖼️</span>
    <p>Drop PNG or WebP files here, or click to browse</p>
    <input type="file" id="file-input" accept=".png,.webp,image/png,image/webp" multiple />
  </div>

  <div id="options">
    <label>
      <input type="checkbox" id="opt-padding" />
      Add padding (px)
      <input type="number" id="padding-val" value="0" min="0" max="500" />
    </label>
    <label>
      <input type="checkbox" id="opt-strip-meta" checked />
      Strip metadata
    </label>
  </div>

  <div id="status"></div>
  <div id="results"></div>

  <canvas id="work-canvas" style="display:none"></canvas>

  <script>
    const dropZone   = document.getElementById('drop-zone');
    const fileInput  = document.getElementById('file-input');
    const results    = document.getElementById('results');
    const status     = document.getElementById('status');
    const workCanvas = document.getElementById('work-canvas');
    const ctx        = workCanvas.getContext('2d', { willReadFrequently: true });

    // Session-level counter for filenames; assigned synchronously before any await
    let fileCounter = 1;

    // --- drag & drop ---
    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      handleFiles(e.dataTransfer.files);
    });
    fileInput.addEventListener('change', () => handleFiles(fileInput.files));

    // --- main entry ---
    function handleFiles(fileList) {
      const files = [...fileList].filter(f => f.type === 'image/png' || f.type === 'image/webp');
      if (!files.length) { status.textContent = 'No valid PNG or WebP files selected.'; return; }
      status.textContent = `Processing ${files.length} file(s)…`;
      Promise.all(files.map(processFile)).then(() => {
        status.textContent = `Done. ${files.length} file(s) processed.`;
        fileInput.value = '';
      });
    }

    async function processFile(file) {
      const idx = fileCounter++; // assign synchronously before any await
      const url = URL.createObjectURL(file);

      try {
        const [img, origBuffer] = await Promise.all([
          loadImage(url),
          file.arrayBuffer(),
        ]);

        const pad       = getPadding();
        const stripMeta = getStripMeta();
        const bounds    = getContentBounds(img);
        const card      = await createCard(file, img, bounds, pad, stripMeta, origBuffer, idx);
        results.prepend(card);
      } catch (e) {
        showError(file.name, e.message);
      } finally {
        URL.revokeObjectURL(url);
      }
    }

    function loadImage(src) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload  = () => resolve(img);
        img.onerror = () => reject(new Error('Failed to load image.'));
        img.src = src;
      });
    }

    // --- filename: yyyy-MMM-dd_NN_cropped.ext ---
    function getOutFilename(ext, idx) {
      const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      const now = new Date();
      const yyyy = now.getFullYear();
      const mmm  = MONTHS[now.getMonth()];
      const dd   = String(now.getDate()).padStart(2, '0');
      const nn   = String(idx).padStart(2, '0');
      return `${yyyy}-${mmm}-${dd}_${nn}_cropped.${ext}`;
    }

    // --- PNG metadata chunk types containing personal/device info ---
    const PNG_META_TYPES = new Set(['tEXt', 'iTXt', 'zTXt', 'eXIf', 'tIME']);

    function extractPNGMetaChunks(buffer) {
      const view = new DataView(buffer);
      const sig  = [137, 80, 78, 71, 13, 10, 26, 10];
      for (let i = 0; i < 8; i++) {
        if (view.getUint8(i) !== sig[i]) return null; // not a PNG
      }

      const chunks = [];
      let offset = 8;

      while (offset + 12 <= buffer.byteLength) {
        const length = view.getUint32(offset);
        if (offset + 12 + length > buffer.byteLength) break;

        const type = String.fromCharCode(
          view.getUint8(offset + 4), view.getUint8(offset + 5),
          view.getUint8(offset + 6), view.getUint8(offset + 7)
        );

        if (PNG_META_TYPES.has(type)) {
          // Slice a copy: length(4) + type(4) + data(length) + CRC(4)
          chunks.push(new Uint8Array(buffer.slice(offset, offset + 12 + length)));
        }

        if (type === 'IEND') break;
        offset += 12 + length;
      }

      return chunks;
    }

    function injectPNGChunks(pngBuffer, metaChunks) {
      if (!metaChunks || metaChunks.length === 0) return pngBuffer;

      // PNG signature (8) + IHDR chunk (4 len + 4 type + 13 data + 4 CRC = 25) = 33 bytes
      const INSERT_AT = 33;
      const extra = metaChunks.reduce((s, c) => s + c.byteLength, 0);
      const out   = new Uint8Array(pngBuffer.byteLength + extra);

      out.set(new Uint8Array(pngBuffer, 0, INSERT_AT), 0);

      let pos = INSERT_AT;
      for (const chunk of metaChunks) { out.set(chunk, pos); pos += chunk.byteLength; }

      out.set(new Uint8Array(pngBuffer, INSERT_AT), pos);
      return out.buffer;
    }

    // --- find bounding box of non-transparent pixels ---
    function getContentBounds(img) {
      workCanvas.width  = img.naturalWidth;
      workCanvas.height = img.naturalHeight;
      ctx.clearRect(0, 0, workCanvas.width, workCanvas.height);
      ctx.drawImage(img, 0, 0);

      const { data, width, height } = ctx.getImageData(0, 0, workCanvas.width, workCanvas.height);

      let top = height, bottom = 0, left = width, right = 0;

      for (let y = 0; y < height; y++) {
        for (let x = 0; x < width; x++) {
          if (data[(y * width + x) * 4 + 3] > 0) {
            if (y < top)    top    = y;
            if (y > bottom) bottom = y;
            if (x < left)   left   = x;
            if (x > right)  right  = x;
          }
        }
      }

      if (top > bottom || left > right) {
        return { top: 0, left: 0, bottom: height - 1, right: width - 1 };
      }
      return { top, left, bottom, right };
    }

    // --- crop and optionally preserve metadata ---
    async function renderCrop(img, bounds, pad, mimeType, stripMeta, origBuffer) {
      const srcX = Math.max(0, bounds.left   - pad);
      const srcY = Math.max(0, bounds.top    - pad);
      const srcR = Math.min(img.naturalWidth  - 1, bounds.right  + pad);
      const srcB = Math.min(img.naturalHeight - 1, bounds.bottom + pad);
      const w    = srcR - srcX + 1;
      const h    = srcB - srcY + 1;

      const out  = document.createElement('canvas');
      out.width  = w;
      out.height = h;
      out.getContext('2d').drawImage(img, srcX, srcY, w, h, 0, 0, w, h);

      // canvas.toBlob strips all metadata by design
      const blob   = await new Promise(resolve => out.toBlob(resolve, mimeType));
      let   buffer = await blob.arrayBuffer();

      let metaKept = false;
      let metaWarn = null; // warning message if preservation wasn't possible

      if (!stripMeta) {
        if (mimeType === 'image/png') {
          const metaChunks = extractPNGMetaChunks(origBuffer);
          if (metaChunks && metaChunks.length > 0) {
            buffer   = injectPNGChunks(buffer, metaChunks);
            metaKept = true;
          }
        } else {
          // WebP metadata is stored in a RIFF container; re-injection requires
          // restructuring the file (VP8X + EXIF/XMP chunks). Not supported here.
          metaWarn = 'WebP metadata cannot be preserved without a dedicated library.';
        }
      }

      const outBlob  = new Blob([buffer], { type: mimeType });
      const blobURL  = URL.createObjectURL(outBlob);
      return { blobURL, outBlob, w, h, srcX, srcY, metaKept, metaWarn };
    }

    // --- UI card ---
    async function createCard(file, img, bounds, pad, stripMeta, origBuffer, idx) {
      const mimeType = file.type;
      const ext      = mimeType === 'image/webp' ? 'webp' : 'png';
      const origW    = img.naturalWidth;
      const origH    = img.naturalHeight;

      const { blobURL, outBlob, w, h, srcX, srcY, metaKept, metaWarn } =
        await renderCrop(img, bounds, pad, mimeType, stripMeta, origBuffer);

      const outName  = getOutFilename(ext, idx);

      // Build metadata badge
      let badgeHTML;
      if (metaWarn) {
        badgeHTML = `<span class="badge badge-warn" title="${metaWarn}">metadata: webp unsupported</span>`;
      } else if (stripMeta) {
        badgeHTML = `<span class="badge badge-stripped">metadata stripped</span>`;
      } else if (metaKept) {
        badgeHTML = `<span class="badge badge-kept">metadata kept</span>`;
      } else {
        badgeHTML = `<span class="badge badge-warn">no metadata found</span>`;
      }

      const origURL = URL.createObjectURL(file);

      const card = document.createElement('div');
      card.className = 'result-card';
      card.innerHTML = `
        <div class="result-header">
          <span class="filename">${escHtml(file.name)}</span>
          <span class="meta">${origW}×${origH} &rarr; ${w}×${h} &nbsp;|&nbsp; offset (${srcX}, ${srcY})</span>
          ${badgeHTML}
          <button class="btn-download">Download</button>
        </div>
        <div class="preview-row">
          <div class="preview-box"><span>Original</span><img src="${origURL}" /></div>
          <div class="preview-box"><span>Cropped &mdash; ${outName}</span><img src="${blobURL}" /></div>
        </div>`;

      card.querySelector('.btn-download').addEventListener('click', () => {
        const a    = document.createElement('a');
        a.href     = blobURL;
        a.download = outName;
        a.click();
      });

      return card;
    }

    function showError(name, msg) {
      const div = document.createElement('div');
      div.className = 'result-card';
      div.innerHTML = `<div class="result-header"><span class="filename">${escHtml(name)}</span></div>
                       <p class="error-msg">Error: ${escHtml(msg)}</p>`;
      results.prepend(div);
    }

    function getPadding() {
      if (!document.getElementById('opt-padding').checked) return 0;
      return Math.max(0, parseInt(document.getElementById('padding-val').value, 10) || 0);
    }

    function getStripMeta() {
      return document.getElementById('opt-strip-meta').checked;
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>
</body>
</html>
