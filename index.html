<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Autocrop</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      color: #111;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1rem;
      gap: 1.5rem;
    }

    h1 { font-size: 1.25rem; font-weight: 600; }
    p.sub { font-size: 0.85rem; color: #888; }

    #drop-zone {
      width: 100%;
      max-width: 560px;
      border: 1.5px dashed #ccc;
      border-radius: 8px;
      padding: 2.5rem 1rem;
      text-align: center;
      cursor: pointer;
      color: #aaa;
      font-size: 0.9rem;
      transition: border-color 0.15s, background 0.15s;
    }
    #drop-zone:hover, #drop-zone.drag-over {
      border-color: #888;
      background: #fff;
      color: #555;
    }
    #file-input { display: none; }

    #options {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;
      font-size: 0.85rem;
      color: #555;
    }
    #options label { display: flex; align-items: center; gap: 0.4rem; cursor: pointer; }
    #options input[type=number] {
      width: 52px;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 0.2rem 0.4rem;
      font-size: 0.85rem;
    }
    #options input[type=checkbox] { accent-color: #333; }

    #status { font-size: 0.8rem; color: #aaa; min-height: 1em; }

    #results {
      width: 100%;
      max-width: 760px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .card {
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      overflow: hidden;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.6rem 0.9rem;
      border-bottom: 1px solid #f0f0f0;
      flex-wrap: wrap;
    }
    .card-header .name  { font-size: 0.82rem; color: #555; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .card-header .dims  { font-size: 0.78rem; color: #bbb; white-space: nowrap; }
    .card-header .tag   { font-size: 0.72rem; padding: 0.15rem 0.45rem; border-radius: 3px; border: 1px solid; white-space: nowrap; }
    .tag-stripped { color: #d44; border-color: #f5c0c0; background: #fff5f5; }
    .tag-kept     { color: #4a4; border-color: #c0e0c0; background: #f5fff5; }
    .tag-warn     { color: #a80; border-color: #e8d8a0; background: #fffbf0; }

    .btn-dl {
      font-size: 0.8rem;
      padding: 0.3rem 0.7rem;
      border: 1px solid #ddd;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
      white-space: nowrap;
      color: #333;
      transition: background 0.1s;
    }
    .btn-dl:hover { background: #f0f0f0; }

    .previews {
      display: grid;
      grid-template-columns: 1fr 1fr;
    }
    .preview {
      padding: 0.75rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      background: #fafafa;
    }
    .preview + .preview { border-left: 1px solid #f0f0f0; }
    .preview .label { font-size: 0.7rem; color: #bbb; text-transform: uppercase; letter-spacing: 0.04em; }
    .preview img {
      max-width: 100%;
      max-height: 220px;
      object-fit: contain;
      border-radius: 3px;
      background-image:
        linear-gradient(45deg, #e8e8e8 25%, transparent 25%),
        linear-gradient(-45deg, #e8e8e8 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #e8e8e8 75%),
        linear-gradient(-45deg, transparent 75%, #e8e8e8 75%);
      background-size: 12px 12px;
      background-position: 0 0, 0 6px, 6px -6px, -6px 0;
    }

    .error { font-size: 0.82rem; color: #d44; padding: 0.75rem 0.9rem; }
  </style>
</head>
<body>
  <h1>Autocrop</h1>
  <p class="sub">Crops PNG &amp; WebP to transparent content bounds</p>

  <div id="drop-zone">
    Drop PNG / WebP files here, or click to browse
    <input type="file" id="file-input" accept=".png,.webp,image/png,image/webp" multiple />
  </div>

  <div id="options">
    <label><input type="checkbox" id="opt-padding" /> Padding (px) <input type="number" id="padding-val" value="0" min="0" max="500" /></label>
    <label><input type="checkbox" id="opt-strip-meta" checked /> Strip metadata</label>
  </div>

  <div id="status"></div>
  <div id="results"></div>
  <canvas id="work-canvas" style="display:none"></canvas>

  <script>
    const dropZone   = document.getElementById('drop-zone');
    const fileInput  = document.getElementById('file-input');
    const resultsEl  = document.getElementById('results');
    const statusEl   = document.getElementById('status');
    const workCanvas = document.getElementById('work-canvas');
    const ctx        = workCanvas.getContext('2d', { willReadFrequently: true });

    let fileCounter = 1;

    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('drag-over'); handleFiles(e.dataTransfer.files); });
    fileInput.addEventListener('change', () => handleFiles(fileInput.files));

    function handleFiles(list) {
      const files = [...list].filter(f => f.type === 'image/png' || f.type === 'image/webp');
      if (!files.length) { statusEl.textContent = 'No PNG or WebP files found.'; return; }
      statusEl.textContent = `Processing ${files.length} file(s)…`;
      Promise.all(files.map(processFile)).then(() => {
        statusEl.textContent = `Done — ${files.length} file(s).`;
        fileInput.value = '';
      });
    }

    async function processFile(file) {
      const idx = fileCounter++;
      const url = URL.createObjectURL(file);
      try {
        const [img, origBuf] = await Promise.all([loadImage(url), file.arrayBuffer()]);
        const card = await buildCard(file, img, origBuf, idx);
        resultsEl.prepend(card);
      } catch (e) {
        resultsEl.prepend(errorCard(file.name, e.message));
      } finally {
        URL.revokeObjectURL(url);
      }
    }

    function loadImage(src) {
      return new Promise((res, rej) => {
        const img = new Image();
        img.onload  = () => res(img);
        img.onerror = () => rej(new Error('Failed to load image.'));
        img.src = src;
      });
    }

    function outFilename(ext, idx) {
      const M = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      const d = new Date();
      return `${d.getFullYear()}-${M[d.getMonth()]}-${String(d.getDate()).padStart(2,'0')}_${String(idx).padStart(2,'0')}_cropped.${ext}`;
    }

    // PNG metadata chunk re-injection
    const META_CHUNKS = new Set(['tEXt','iTXt','zTXt','eXIf','tIME']);

    function extractPNGMeta(buf) {
      const v = new DataView(buf);
      const sig = [137,80,78,71,13,10,26,10];
      for (let i = 0; i < 8; i++) if (v.getUint8(i) !== sig[i]) return null;
      const out = []; let o = 8;
      while (o + 12 <= buf.byteLength) {
        const len  = v.getUint32(o);
        if (o + 12 + len > buf.byteLength) break;
        const type = String.fromCharCode(v.getUint8(o+4),v.getUint8(o+5),v.getUint8(o+6),v.getUint8(o+7));
        if (META_CHUNKS.has(type)) out.push(new Uint8Array(buf.slice(o, o + 12 + len)));
        if (type === 'IEND') break;
        o += 12 + len;
      }
      return out;
    }

    function injectPNGMeta(pngBuf, chunks) {
      if (!chunks || !chunks.length) return pngBuf;
      const AT = 33; // sig(8) + IHDR chunk(25)
      const extra = chunks.reduce((s, c) => s + c.byteLength, 0);
      const out = new Uint8Array(pngBuf.byteLength + extra);
      out.set(new Uint8Array(pngBuf, 0, AT), 0);
      let p = AT;
      for (const c of chunks) { out.set(c, p); p += c.byteLength; }
      out.set(new Uint8Array(pngBuf, AT), p);
      return out.buffer;
    }

    function getBounds(img) {
      workCanvas.width  = img.naturalWidth;
      workCanvas.height = img.naturalHeight;
      ctx.clearRect(0, 0, workCanvas.width, workCanvas.height);
      ctx.drawImage(img, 0, 0);
      const { data, width, height } = ctx.getImageData(0, 0, workCanvas.width, workCanvas.height);
      let top = height, bot = 0, lft = width, rgt = 0;
      for (let y = 0; y < height; y++)
        for (let x = 0; x < width; x++)
          if (data[(y * width + x) * 4 + 3] > 0) {
            if (y < top) top = y; if (y > bot) bot = y;
            if (x < lft) lft = x; if (x > rgt) rgt = x;
          }
      return (top > bot || lft > rgt)
        ? { top:0, lft:0, bot:height-1, rgt:width-1 }
        : { top, lft, bot, rgt };
    }

    async function crop(img, bounds, pad, mime, strip, origBuf) {
      const x = Math.max(0, bounds.lft - pad),  y = Math.max(0, bounds.top - pad);
      const r = Math.min(img.naturalWidth-1,  bounds.rgt + pad);
      const b = Math.min(img.naturalHeight-1, bounds.bot + pad);
      const w = r - x + 1, h = b - y + 1;

      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, x, y, w, h, 0, 0, w, h);

      const blob = await new Promise(res => c.toBlob(res, mime));
      let buf    = await blob.arrayBuffer();

      let kept = false, warn = null;
      if (!strip) {
        if (mime === 'image/png') {
          const meta = extractPNGMeta(origBuf);
          if (meta && meta.length) { buf = injectPNGMeta(buf, meta); kept = true; }
        } else {
          warn = 'WebP metadata cannot be preserved';
        }
      }

      return { blobURL: URL.createObjectURL(new Blob([buf], { type: mime })), w, h, x, y, kept, warn };
    }

    async function buildCard(file, img, origBuf, idx) {
      const ext   = file.type === 'image/webp' ? 'webp' : 'png';
      const strip = document.getElementById('opt-strip-meta').checked;
      const pad   = document.getElementById('opt-padding').checked
                    ? Math.max(0, parseInt(document.getElementById('padding-val').value, 10) || 0) : 0;

      const { blobURL, w, h, x, y, kept, warn } = await crop(img, getBounds(img), pad, file.type, strip, origBuf);
      const fname = outFilename(ext, idx);
      const origURL = URL.createObjectURL(file);

      let tag = '';
      if (warn)       tag = `<span class="tag tag-warn">${esc(warn)}</span>`;
      else if (strip) tag = `<span class="tag tag-stripped">metadata stripped</span>`;
      else if (kept)  tag = `<span class="tag tag-kept">metadata kept</span>`;
      else            tag = `<span class="tag tag-warn">no metadata found</span>`;

      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="card-header">
          <span class="name" title="${esc(file.name)}">${esc(file.name)}</span>
          <span class="dims">${img.naturalWidth}×${img.naturalHeight} → ${w}×${h}</span>
          ${tag}
          <button class="btn-dl">Download</button>
        </div>
        <div class="previews">
          <div class="preview"><span class="label">Before</span><img src="${origURL}" /></div>
          <div class="preview"><span class="label">After — ${esc(fname)}</span><img src="${blobURL}" /></div>
        </div>`;

      card.querySelector('.btn-dl').addEventListener('click', () => {
        Object.assign(document.createElement('a'), { href: blobURL, download: fname }).click();
      });
      return card;
    }

    function errorCard(name, msg) {
      const d = document.createElement('div');
      d.className = 'card';
      d.innerHTML = `<div class="card-header"><span class="name">${esc(name)}</span></div><p class="error">${esc(msg)}</p>`;
      return d;
    }

    function esc(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>
</body>
</html>
